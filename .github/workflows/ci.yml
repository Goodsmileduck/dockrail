name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      # Pin the toolchain: setup-go provides exactly this version, matching
      # go.mod's `toolchain go1.26.4`, so no on-the-fly toolchain download.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          check-latest: false

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  build-cli:
    # Cross-compile the CLI for every supported platform and upload the
    # binaries as build artifacts. Runs after tests pass.
    needs: build-test
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          check-latest: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="dockrail-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w" -o "$out" .
          echo "artifact=$out" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: dockrail-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.artifact }}
          if-no-files-found: error
