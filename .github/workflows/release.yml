name: release

# Build binaries for every supported platform and publish them on a GitHub
# release whenever a semver tag (v1.2.3) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          check-latest: false

      - name: Build release binaries
        run: |
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          platforms="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for p in $platforms; do
            export GOOS="${p%/*}" GOARCH="${p#*/}"
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            out="dockrail-${GOOS}-${GOARCH}${ext}"
            echo "building $out"
            go build -trimpath \
              -ldflags "-s -w -X main.version=${version}" \
              -o "dist/${out}" .
          done
          ( cd dist && sha256sum dockrail-* > checksums.txt )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
